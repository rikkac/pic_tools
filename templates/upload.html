<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上传图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: calc(100vh - 120px);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #FFD700;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            text-decoration: none;
        }

        .back-link:hover {
            color: #FFD700;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 8px;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:active {
            background: #FFD700;
            color: #000;
        }

        .btn-full {
            background: #FFD700;
            color: #000;
        }

        .btn-full:active {
            background: #E6C200;
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:active {
            background: #ff4444;
            color: #fff;
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .message.success {
            display: block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        /* 弹窗提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.95);
            color: #000;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            display: block;
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #333;
            border-radius: 8px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .upload-btn:hover {
            border-color: #FFD700;
            color: #FFD700;
        }

        .upload-btn.has-file {
            border-color: #FFD700;
            color: #FFD700;
        }

        /* 压缩选项 */
        .compression-options {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .compression-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .compression-label {
            font-size: 14px;
            color: #888;
        }

        .compression-toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .compression-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #666;
            transition: 0.3s;
            border-radius: 50%;
        }

        .compression-toggle input:checked + .toggle-slider {
            background-color: #FFD700;
        }

        .compression-toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: #000;
        }

        .compression-quality {
            display: none;
        }

        .compression-quality.show {
            display: block;
        }

        .quality-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .quality-value {
            color: #FFD700;
            font-weight: 500;
        }

        /* 自定义质量滑块 */
        .quality-slider-container {
            position: relative;
            height: 40px;
            margin-bottom: 8px;
        }

        .quality-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            transform: translateY(-50%);
            background: #333;
            border-radius: 2px;
        }

        .quality-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #FFD700;
            border-radius: 2px;
            transition: width 0.1s;
        }

        .quality-nodes {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .quality-node {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #444;
            position: relative;
            z-index: 1;
            transition: all 0.2s;
        }

        .quality-node.active {
            background: #FFD700;
            border-color: #FFD700;
            transform: scale(1.1);
        }

        .quality-node.passed {
            background: #FFD700;
            border-color: #FFD700;
        }

        .quality-thumb {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 18px;
            background: #FFD700;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
            transition: left 0.1s, transform 0.1s;
            z-index: 2;
        }

        .quality-thumb:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.15);
        }

        .quality-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }

        .quality-label-item {
            font-size: 10px;
            color: #555;
            text-align: center;
            width: 12px;
        }

        .quality-label-item.active {
            color: #FFD700;
        }

        .compression-info {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .compression-info.show {
            display: flex;
            justify-content: space-between;
        }

        .original-size, .compressed-size {
            text-align: center;
        }

        .size-value {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .compressed-size .size-value {
            color: #FFD700;
        }

        .compression-ratio {
            color: #4caf50;
            font-size: 12px;
            margin-top: 4px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #111;
            border-radius: 8px;
            text-align: center;
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .password-display {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            letter-spacing: 8px;
            margin: 20px 0;
            word-break: break-all;
        }

        .copy-btn {
            width: auto;
            padding: 12px 40px;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-group .btn {
            flex: 1;
            margin: 0;
        }

        /* 底部导航 */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .bottom-nav.show {
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        /* 为底部导航预留空间 */
        body.has-bottom-nav {
            padding-bottom: 80px;
        }

        /* 上传进度条 */
        .progress-container {
            visibility: hidden;
            opacity: 0;
            margin-bottom: 20px;
            height: 40px;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .progress-container.show {
            visibility: visible;
            opacity: 1;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 3px;
            width: 0%;
            transition: width 0.2s;
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="container">
        <h1>上传图片</h1>

        <a href="/" class="back-link">返回首页</a>

        <div id="message" class="message"></div>

        <!-- 弹窗提示 -->
        <div class="toast" id="toast"></div>

        <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
        <label for="fileInput" class="upload-btn" id="uploadBtn">
            点击选择图片或视频
        </label>

        <!-- 确认上传按钮 -->
        <button class="btn btn-full" id="confirmUploadBtn" disabled>确认上传</button>

        <!-- 压缩选项 -->
        <div class="compression-options" id="compressionOptions">
            <div class="compression-header">
                <span class="compression-label">上传时压缩</span>
                <label class="compression-toggle">
                    <input type="checkbox" id="compressionToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="compression-quality show" id="compressionQuality">
                <div class="quality-label">
                    <span>压缩质量</span>
                    <span class="quality-value" id="qualityValue">50</span>
                </div>
                <div class="quality-slider-container" id="qualitySliderContainer">
                    <div class="quality-track">
                        <div class="quality-fill" id="qualityFill"></div>
                    </div>
                    <div class="quality-nodes" id="qualityNodes"></div>
                    <div class="quality-thumb" id="qualityThumb"></div>
                </div>
                <div class="quality-labels" id="qualityLabels"></div>
            </div>
            <div class="compression-info" id="compressionInfo">
                <div class="original-size">
                    <div>原文件</div>
                    <div class="size-value" id="originalSize">-</div>
                </div>
                <div class="compressed-size">
                    <div>压缩后</div>
                    <div class="size-value" id="compressedSize">-</div>
                    <div class="compression-ratio" id="compressionRatio"></div>
                </div>
            </div>
        </div>

        <!-- 上传进度条 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-text" id="progressText">0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="margin-top: 10px; color: #666;">上传中...</div>
        </div>

        <!-- 上传结果 -->
        <div class="result-section" id="resultSection">
            <div class="result-title">上传成功</div>
            <div class="password-display" id="passwordDisplay"></div>
            <button class="btn btn-full copy-btn" id="copyBtn">复制密码</button>
            <div class="btn-group">
                <button class="btn" id="uploadMoreBtn">继续上传</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav show">
        <a href="/" class="nav-item" data-page="index">首页</a>
        <a href="/upload-page" class="nav-item active" data-page="upload">上传</a>
        <a href="/admin" class="nav-item" data-page="list">列表</a>
    </div>

    <script>
        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 弹窗提示
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 文件选择
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        // 压缩相关元素
        const compressionToggle = document.getElementById('compressionToggle');
        const compressionQuality = document.getElementById('compressionQuality');
        const compressionInfo = document.getElementById('compressionInfo');
        const qualityValue = document.getElementById('qualityValue');
        const originalSizeEl = document.getElementById('originalSize');
        const compressedSizeEl = document.getElementById('compressedSize');
        const compressionRatioEl = document.getElementById('compressionRatio');

        // 自定义滑块元素
        const qualitySliderContainer = document.getElementById('qualitySliderContainer');
        const qualityFill = document.getElementById('qualityFill');
        const qualityNodes = document.getElementById('qualityNodes');
        const qualityThumb = document.getElementById('qualityThumb');
        const qualityLabels = document.getElementById('qualityLabels');

        // 质量节点值
        const qualitySteps = [10, 30, 50, 70, 90];
        let currentQuality = 50;
        let isDragging = false;

        // 确认上传按钮
        const confirmUploadBtn = document.getElementById('confirmUploadBtn');

        // 保存选中的文件
        let selectedFile = null;
        let compressedFile = null;
        let isCompressing = false;

        // 压缩开关
        compressionToggle.addEventListener('change', async function() {
            compressionQuality.classList.toggle('show', this.checked);
            if (!this.checked) {
                compressionInfo.classList.remove('show');
                // 关闭压缩时，使用原始文件
                if (selectedFile) {
                    compressedFile = selectedFile;
                }
            } else if (selectedFile && selectedFile.type.startsWith('image/')) {
                // 开启压缩时，重新压缩
                const quality = currentQuality / 100;
                confirmUploadBtn.disabled = true;
                progressContainer.classList.add('show');
                progressFill.style.width = '0%';
                progressText.textContent = '压缩中...';

                try {
                    const compressedBlob = await compressImage(selectedFile, quality);
                    compressedFile = new File([compressedBlob], selectedFile.name.replace(/\.[^.]+$/, '.jpg'), {
                        type: 'image/jpeg',
                        lastModified: Date.now()
                    });
                    updateCompressionInfo(selectedFile, compressedBlob);
                } catch (e) {
                    showMessage('压缩失败，使用原文件', 'error');
                    compressedFile = selectedFile;
                }
                progressContainer.classList.remove('show');
                confirmUploadBtn.disabled = false;
            }
        });

        // 质量滑块（已在下面处理）

        // 初始化自定义滑块
        function initQualitySlider() {
            // 创建节点
            qualityNodes.innerHTML = '';
            qualitySteps.forEach((val, index) => {
                const node = document.createElement('div');
                node.className = 'quality-node';
                node.dataset.value = val;
                qualityNodes.appendChild(node);
            });

            // 创建标签
            qualityLabels.innerHTML = '';
            qualitySteps.forEach((val) => {
                const label = document.createElement('span');
                label.className = 'quality-label-item';
                label.textContent = val;
                qualityLabels.appendChild(label);
            });

            // 设置初始值
            setQualityValue(currentQuality, false);
        }

        // 设置质量值
        function setQualityValue(value, triggerEvent = true) {
            // 找到最近的值
            let closest = qualitySteps[0];
            let minDiff = Math.abs(value - closest);
            for (let i = 1; i < qualitySteps.length; i++) {
                const diff = Math.abs(value - qualitySteps[i]);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = qualitySteps[i];
                }
            }
            currentQuality = closest;

            // 更新显示
            qualityValue.textContent = currentQuality;

            // 更新滑块位置
            const index = qualitySteps.indexOf(currentQuality);
            const percent = index / (qualitySteps.length - 1);
            // 使用像素精确定位，让 thumb 圆心与节点圆心对齐
            const containerWidth = qualitySliderContainer.offsetWidth;
            // CSS中 left:0; right:0，节点圆心在6px和containerWidth-6px
            // thumb 圆心 = percent * (containerWidth - 12) + 6
            const thumbLeft = percent * (containerWidth - 12) + 6;
            qualityThumb.style.left = thumbLeft + 'px';
            qualityThumb.style.transform = 'translate(-50%, -50%)';
            qualityFill.style.width = (percent * 100) + '%';

            // 更新节点状态
            const nodes = qualityNodes.querySelectorAll('.quality-node');
            nodes.forEach((node, i) => {
                node.classList.remove('active', 'passed');
                if (i === index) {
                    node.classList.add('active');
                } else if (i < index) {
                    node.classList.add('passed');
                }
            });

            // 更新标签状态
            const labels = qualityLabels.querySelectorAll('.quality-label-item');
            labels.forEach((label, i) => {
                label.classList.toggle('active', i === index);
            });

            // 触发事件
            if (triggerEvent) {
                qualitySliderContainer.dispatchEvent(new CustomEvent('qualitychange', { detail: { value: currentQuality } }));
            }
        }

        // 计算滑块值的比例
        function getValueFromPosition(clientX) {
            const rect = qualitySliderContainer.getBoundingClientRect();
            // 节点圆心在6px和W-6px，所以点击位置需要映射到节点圆心位置
            const nodeCenterOffset = 6;
            let percent = (clientX - rect.left - nodeCenterOffset) / (rect.width - nodeCenterOffset * 2);
            percent = Math.max(0, Math.min(1, percent));
            const index = Math.round(percent * (qualitySteps.length - 1));
            return qualitySteps[index];
        }

        // 拖动开始
        function startDrag(e) {
            e.preventDefault();
            isDragging = true;
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchmove', onDrag);
            document.addEventListener('touchend', endDrag);
            qualityThumb.style.transition = 'none';
            onDrag(e);
        }

        // 拖动中
        function onDrag(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const value = getValueFromPosition(clientX);
            setQualityValue(value, true);
        }

        // 拖动结束
        function endDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('touchend', endDrag);
            qualityThumb.style.transition = '';
            // 确保吸附到最近节点
            setQualityValue(currentQuality, true);
        }

        // 绑定拖动事件
        qualityThumb.addEventListener('mousedown', startDrag);
        qualityThumb.addEventListener('touchstart', startDrag);

        // 点击滑块容器也可以移动
        qualitySliderContainer.addEventListener('click', function(e) {
            if (e.target === qualityThumb) return;
            const value = getValueFromPosition(e.clientX);
            setQualityValue(value, true);
        });

        // 初始化滑块
        initQualitySlider();

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const mb = bytes / (1024 * 1024);
            if (mb >= 1) {
                return mb.toFixed(1) + ' MB';
            }
            const kb = bytes / 1024;
            return kb.toFixed(1) + ' KB';
        }

        // 压缩图片
        function compressImage(file, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        // 转换为 JPEG 压缩
                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('压缩失败'));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 更新压缩信息显示
        function updateCompressionInfo(originalFile, compressedBlob) {
            const originalSize = originalFile.size;
            const compressedSize = compressedBlob.size;

            originalSizeEl.textContent = formatFileSize(originalSize);
            compressedSizeEl.textContent = formatFileSize(compressedSize);

            const ratio = Math.round((1 - compressedSize / originalSize) * 100);
            if (ratio > 0) {
                compressionRatioEl.textContent = '减小 ' + ratio + '%';
                compressionRatioEl.style.color = '#4caf50';
            } else {
                compressionRatioEl.textContent = '增加 ' + Math.abs(ratio) + '%';
                compressionRatioEl.style.color = '#ff4444';
            }

            compressionInfo.classList.add('show');
        }

        // 选择文件后立即压缩
        fileInput.addEventListener('change', async function() {
            selectedFile = this.files[0];
            if (!selectedFile) {
                uploadBtn.textContent = '点击选择图片';
                uploadBtn.classList.remove('has-file');
                confirmUploadBtn.disabled = true;
                // 恢复压缩选项
                compressionToggle.disabled = false;
                compressionToggle.checked = true;
                compressionQuality.classList.add('show');
                compressionInfo.classList.remove('show');
                progressContainer.classList.remove('show');
                selectedFile = null;
                compressedFile = null;
                return;
            }

            uploadBtn.textContent = '已选择: ' + selectedFile.name;
            uploadBtn.classList.add('has-file');

            // 显示原文件大小
            originalSizeEl.textContent = formatFileSize(selectedFile.size);

            // 处理视频（禁用压缩）
            const isVideo = selectedFile.type.startsWith('video/');
            if (isVideo) {
                compressionToggle.checked = false;
                compressionToggle.disabled = true;
                compressionQuality.classList.remove('show');
                compressionInfo.classList.remove('show');
                showMessage('视频文件不支持压缩，已自动关闭', 'success');
                compressedFile = selectedFile;
                confirmUploadBtn.disabled = false;
            } else if (compressionToggle.checked) {
                // 图片且开启压缩，立即压缩
                const quality = currentQuality / 100;
                confirmUploadBtn.disabled = true; // 禁用上传按钮，压缩中
                progressContainer.classList.add('show');
                progressFill.style.width = '0%';
                progressText.textContent = '压缩中...';

                try {
                    const compressedBlob = await compressImage(selectedFile, quality);
                    compressedFile = new File([compressedBlob], selectedFile.name.replace(/\.[^.]+$/, '.jpg'), {
                        type: 'image/jpeg',
                        lastModified: Date.now()
                    });
                    updateCompressionInfo(selectedFile, compressedBlob);
                } catch (e) {
                    showMessage('压缩失败，使用原文件', 'error');
                    compressedFile = selectedFile;
                    compressionInfo.classList.remove('show');
                }
                progressContainer.classList.remove('show');
                confirmUploadBtn.disabled = false;
            } else {
                // 关闭压缩
                compressedFile = selectedFile;
                compressionInfo.classList.remove('show');
                confirmUploadBtn.disabled = false;
            }
        });

        // 压缩质量拖动时重新压缩
        qualitySliderContainer.addEventListener('qualitychange', async function(e) {
            if (isCompressing || !selectedFile || !selectedFile.type.startsWith('image/') || !compressionToggle.checked) return;

            isCompressing = true;

            const file = selectedFile;
            const quality = currentQuality / 100;

            confirmUploadBtn.disabled = true;
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '压缩中...';

            try {
                const compressedBlob = await compressImage(file, quality);
                compressedFile = new File([compressedBlob], file.name.replace(/\.[^.]+$/, '.jpg'), {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });

                // 更新压缩后的大小显示
                const originalSize = file.size;
                const compressedSize = compressedBlob.size;
                compressedSizeEl.textContent = formatFileSize(compressedSize);
                originalSizeEl.textContent = formatFileSize(originalSize);

                const ratio = Math.round((1 - compressedSize / originalSize) * 100);
                if (ratio > 0) {
                    compressionRatioEl.textContent = '减小 ' + ratio + '%';
                    compressionRatioEl.style.color = '#4caf50';
                } else {
                    compressionRatioEl.textContent = '增加 ' + Math.abs(ratio) + '%';
                    compressionRatioEl.style.color = '#ff4444';
                }
                compressionInfo.classList.add('show');
            } catch (e) {
                showMessage('压缩失败', 'error');
            }

            progressContainer.classList.remove('show');
            confirmUploadBtn.disabled = false;
            isCompressing = false;
        });

        // 确认上传按钮点击事件
        confirmUploadBtn.addEventListener('click', function() {
            if (!compressedFile) return;
            uploadFile(compressedFile);
        });

        // 上传文件函数
        function uploadFile(uploadFile) {
            const formData = new FormData();
            formData.append('file', uploadFile);

            // 禁用确认按钮，显示进度条
            confirmUploadBtn.disabled = true;
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '0%';

            const xhr = new XMLHttpRequest();

            // 进度事件
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = percent + '%';
                }
            });

            // 上传完成
            xhr.addEventListener('load', function() {
                try {
                    const data = JSON.parse(xhr.responseText);

                    progressContainer.classList.remove('show');

                    if (data.success) {
                        document.getElementById('passwordDisplay').textContent = data.password;
                        document.getElementById('resultSection').classList.add('show');
                        document.querySelector('.upload-btn').style.display = 'none';
                        showToast('上传成功');
                    } else {
                        showMessage(data.message || '上传失败', 'error');
                    }
                } catch (e) {
                    showMessage('上传失败', 'error');
                } finally {
                    fileInput.value = '';
                }
            });

            // 上传错误
            xhr.addEventListener('error', function() {
                progressContainer.classList.remove('show');
                showMessage('上传失败', 'error');
                fileInput.value = '';
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        // 复制密码
        document.getElementById('copyBtn').addEventListener('click', async function() {
            const password = document.getElementById('passwordDisplay').textContent;
            try {
                await navigator.clipboard.writeText(password);
                showMessage('密码已复制', 'success');
            } catch (e) {
                // 兼容旧浏览器
                const input = document.createElement('input');
                input.value = password;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showMessage('密码已复制', 'success');
            }
        });

        // 继续上传
        document.getElementById('uploadMoreBtn').addEventListener('click', function() {
            document.getElementById('resultSection').classList.remove('show');
            document.querySelector('.upload-btn').style.display = 'block';
            uploadBtn.textContent = '点击选择图片';
            uploadBtn.classList.remove('has-file');
            confirmUploadBtn.disabled = true;
            selectedFile = null;
            compressedFile = null;
            // 恢复压缩选项
            compressionToggle.disabled = false;
            compressionToggle.checked = true;
            compressionQuality.classList.add('show');
            compressionInfo.classList.remove('show');
        });
    </script>
</body>
</html>
