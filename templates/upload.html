<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上传图片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: calc(100vh - 120px);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #FFD700;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            text-decoration: none;
        }

        .back-link:hover {
            color: #FFD700;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 8px;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:active {
            background: #FFD700;
            color: #000;
        }

        .btn-full {
            background: #FFD700;
            color: #000;
        }

        .btn-full:active {
            background: #E6C200;
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:active {
            background: #ff4444;
            color: #fff;
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .message.success {
            display: block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        /* 弹窗提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.95);
            color: #000;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            display: block;
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #333;
            border-radius: 8px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-btn:hover {
            border-color: #FFD700;
            color: #FFD700;
        }

        .upload-btn.has-file {
            border-color: #FFD700;
            color: #FFD700;
        }

        /* 压缩选项 */
        .compression-options {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .compression-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .compression-label {
            font-size: 14px;
            color: #888;
        }

        .compression-toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .compression-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #666;
            transition: 0.3s;
            border-radius: 50%;
        }

        .compression-toggle input:checked + .toggle-slider {
            background-color: #FFD700;
        }

        .compression-toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
            background-color: #000;
        }

        .compression-quality {
            display: none;
        }

        .compression-quality.show {
            display: block;
        }

        .quality-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .quality-value {
            color: #FFD700;
        }

        .quality-slider {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        .quality-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
        }

        .compression-info {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .compression-info.show {
            display: flex;
            justify-content: space-between;
        }

        .original-size, .compressed-size {
            text-align: center;
        }

        .size-value {
            font-size: 16px;
            color: #fff;
            margin-top: 4px;
        }

        .compressed-size .size-value {
            color: #FFD700;
        }

        .compression-ratio {
            color: #4caf50;
            font-size: 12px;
            margin-top: 4px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #111;
            border-radius: 8px;
            text-align: center;
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .password-display {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            letter-spacing: 8px;
            margin: 20px 0;
            word-break: break-all;
        }

        .copy-btn {
            width: auto;
            padding: 12px 40px;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-group .btn {
            flex: 1;
            margin: 0;
        }

        /* 底部导航 */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .bottom-nav.show {
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        /* 为底部导航预留空间 */
        body.has-bottom-nav {
            padding-bottom: 80px;
        }

        /* 上传进度条 */
        .progress-container {
            display: none;
            margin-bottom: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 3px;
            width: 0%;
            transition: width 0.2s;
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="container">
        <h1>上传图片</h1>

        <a href="/" class="back-link">返回首页</a>

        <div id="message" class="message"></div>

        <!-- 弹窗提示 -->
        <div class="toast" id="toast"></div>

        <input type="file" id="fileInput" class="file-input" accept="image/*,video/*">
        <label for="fileInput" class="upload-btn" id="uploadBtn">
            点击选择图片或视频
        </label>

        <!-- 确认上传按钮 -->
        <button class="btn btn-full" id="confirmUploadBtn" style="display: none;">确认上传</button>

        <!-- 压缩选项 -->
        <div class="compression-options" id="compressionOptions">
            <div class="compression-header">
                <span class="compression-label">上传时压缩</span>
                <label class="compression-toggle">
                    <input type="checkbox" id="compressionToggle" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="compression-quality show" id="compressionQuality">
                <div class="quality-label">
                    <span>压缩质量</span>
                    <span class="quality-value" id="qualityValue">80%</span>
                </div>
                <input type="range" class="quality-slider" id="qualitySlider" min="60" max="100" value="80">
            </div>
            <div class="compression-info" id="compressionInfo">
                <div class="original-size">
                    <div>原文件</div>
                    <div class="size-value" id="originalSize">-</div>
                </div>
                <div class="compressed-size">
                    <div>压缩后</div>
                    <div class="size-value" id="compressedSize">-</div>
                    <div class="compression-ratio" id="compressionRatio"></div>
                </div>
            </div>
        </div>

        <!-- 上传进度条 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-text" id="progressText">0%</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="margin-top: 10px; color: #666;">上传中...</div>
        </div>

        <!-- 上传结果 -->
        <div class="result-section" id="resultSection">
            <div class="result-title">上传成功</div>
            <div class="password-display" id="passwordDisplay"></div>
            <button class="btn btn-full copy-btn" id="copyBtn">复制密码</button>
            <div class="btn-group">
                <button class="btn" id="uploadMoreBtn">继续上传</button>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav show">
        <a href="/" class="nav-item" data-page="index">首页</a>
        <a href="/upload-page" class="nav-item active" data-page="upload">上传</a>
        <a href="/admin" class="nav-item" data-page="list">列表</a>
    </div>

    <script>
        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 弹窗提示
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // 文件选择
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        // 压缩相关元素
        const compressionToggle = document.getElementById('compressionToggle');
        const compressionQuality = document.getElementById('compressionQuality');
        const compressionInfo = document.getElementById('compressionInfo');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityValue = document.getElementById('qualityValue');
        const originalSizeEl = document.getElementById('originalSize');
        const compressedSizeEl = document.getElementById('compressedSize');
        const compressionRatioEl = document.getElementById('compressionRatio');

        // 确认上传按钮
        const confirmUploadBtn = document.getElementById('confirmUploadBtn');

        // 保存选中的文件
        let selectedFile = null;
        let compressedFile = null;
        let isCompressing = false;

        // 压缩开关
        compressionToggle.addEventListener('change', function() {
            compressionQuality.classList.toggle('show', this.checked);
            if (!this.checked) {
                compressionInfo.classList.remove('show');
            }
        });

        // 质量滑块（已在下面处理）

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const mb = bytes / (1024 * 1024);
            if (mb >= 1) {
                return mb.toFixed(1) + ' MB';
            }
            const kb = bytes / 1024;
            return kb.toFixed(1) + ' KB';
        }

        // 压缩图片
        function compressImage(file, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        // 转换为 JPEG 压缩
                        canvas.toBlob((blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('压缩失败'));
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 更新压缩信息显示
        function updateCompressionInfo(originalFile, compressedBlob) {
            const originalSize = originalFile.size;
            const compressedSize = compressedBlob.size;

            originalSizeEl.textContent = formatFileSize(originalSize);
            compressedSizeEl.textContent = formatFileSize(compressedSize);

            const ratio = Math.round((1 - compressedSize / originalSize) * 100);
            if (ratio > 0) {
                compressionRatioEl.textContent = '减小 ' + ratio + '%';
                compressionRatioEl.style.color = '#4caf50';
            } else {
                compressionRatioEl.textContent = '增加 ' + Math.abs(ratio) + '%';
                compressionRatioEl.style.color = '#ff4444';
            }

            compressionInfo.classList.add('show');
        }

        // 选择文件后立即压缩
        fileInput.addEventListener('change', async function() {
            selectedFile = this.files[0];
            if (!selectedFile) {
                uploadBtn.textContent = '点击选择图片';
                uploadBtn.classList.remove('has-file');
                confirmUploadBtn.style.display = 'none';
                // 恢复压缩选项
                compressionToggle.disabled = false;
                compressionToggle.checked = true;
                compressionQuality.classList.add('show');
                compressionInfo.classList.remove('show');
                progressContainer.classList.remove('show');
                selectedFile = null;
                compressedFile = null;
                return;
            }

            uploadBtn.textContent = '已选择: ' + selectedFile.name;
            uploadBtn.classList.add('has-file');

            // 显示原文件大小
            originalSizeEl.textContent = formatFileSize(selectedFile.size);

            // 处理视频（禁用压缩）
            const isVideo = selectedFile.type.startsWith('video/');
            if (isVideo) {
                compressionToggle.checked = false;
                compressionToggle.disabled = true;
                compressionQuality.classList.remove('show');
                compressionInfo.classList.remove('show');
                showMessage('视频文件不支持压缩，已自动关闭', 'success');
                compressedFile = selectedFile;
                confirmUploadBtn.style.display = 'block';
            } else if (compressionToggle.checked) {
                // 图片且开启压缩，立即压缩
                const quality = parseInt(qualitySlider.value) / 100;
                confirmUploadBtn.style.display = 'none'; // 隐藏上传按钮，压缩中
                progressContainer.classList.add('show');
                progressFill.style.width = '0%';
                progressText.textContent = '压缩中...';

                try {
                    const compressedBlob = await compressImage(selectedFile, quality);
                    compressedFile = new File([compressedBlob], selectedFile.name.replace(/\.[^.]+$/, '.jpg'), {
                        type: 'image/jpeg',
                        lastModified: Date.now()
                    });
                    updateCompressionInfo(selectedFile, compressedBlob);
                } catch (e) {
                    showMessage('压缩失败，使用原文件', 'error');
                    compressedFile = selectedFile;
                    compressionInfo.classList.remove('show');
                }
                progressContainer.classList.remove('show');
                confirmUploadBtn.style.display = 'block';
            } else {
                // 关闭压缩
                compressedFile = selectedFile;
                compressionInfo.classList.remove('show');
                confirmUploadBtn.style.display = 'block';
            }
        });

        // 压缩质量拖动时重新压缩
        qualitySlider.addEventListener('input', async function() {
            if (isCompressing || !selectedFile || !selectedFile.type.startsWith('image/') || !compressionToggle.checked) return;

            isCompressing = true;
            qualityValue.textContent = this.value + '%';

            const file = selectedFile;
            const quality = parseInt(this.value) / 100;

            confirmUploadBtn.style.display = 'none';
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '压缩中...';

            try {
                const compressedBlob = await compressImage(file, quality);
                compressedFile = new File([compressedBlob], file.name.replace(/\.[^.]+$/, '.jpg'), {
                    type: 'image/jpeg',
                    lastModified: Date.now()
                });

                // 更新压缩后的大小显示
                const originalSize = file.size;
                const compressedSize = compressedBlob.size;
                compressedSizeEl.textContent = formatFileSize(compressedSize);
                originalSizeEl.textContent = formatFileSize(originalSize);

                const ratio = Math.round((1 - compressedSize / originalSize) * 100);
                if (ratio > 0) {
                    compressionRatioEl.textContent = '减小 ' + ratio + '%';
                    compressionRatioEl.style.color = '#4caf50';
                } else {
                    compressionRatioEl.textContent = '增加 ' + Math.abs(ratio) + '%';
                    compressionRatioEl.style.color = '#ff4444';
                }
                compressionInfo.classList.add('show');
            } catch (e) {
                showMessage('压缩失败', 'error');
            }

            progressContainer.classList.remove('show');
            confirmUploadBtn.style.display = 'block';
            isCompressing = false;
        });

        // 确认上传按钮点击事件
        confirmUploadBtn.addEventListener('click', function() {
            if (!compressedFile) return;
            uploadFile(compressedFile);
        });

        // 上传文件函数
        function uploadFile(uploadFile) {
            const formData = new FormData();
            formData.append('file', uploadFile);

            // 隐藏确认按钮，显示进度条
            confirmUploadBtn.style.display = 'none';
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '0%';

            const xhr = new XMLHttpRequest();

            // 进度事件
            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = percent + '%';
                }
            });

            // 上传完成
            xhr.addEventListener('load', function() {
                try {
                    const data = JSON.parse(xhr.responseText);

                    progressContainer.classList.remove('show');

                    if (data.success) {
                        document.getElementById('passwordDisplay').textContent = data.password;
                        document.getElementById('resultSection').classList.add('show');
                        document.querySelector('.upload-btn').style.display = 'none';
                        showToast('上传成功');
                    } else {
                        showMessage(data.message || '上传失败', 'error');
                    }
                } catch (e) {
                    showMessage('上传失败', 'error');
                } finally {
                    fileInput.value = '';
                }
            });

            // 上传错误
            xhr.addEventListener('error', function() {
                progressContainer.classList.remove('show');
                showMessage('上传失败', 'error');
                fileInput.value = '';
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        // 复制密码
        document.getElementById('copyBtn').addEventListener('click', async function() {
            const password = document.getElementById('passwordDisplay').textContent;
            try {
                await navigator.clipboard.writeText(password);
                showMessage('密码已复制', 'success');
            } catch (e) {
                // 兼容旧浏览器
                const input = document.createElement('input');
                input.value = password;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showMessage('密码已复制', 'success');
            }
        });

        // 继续上传
        document.getElementById('uploadMoreBtn').addEventListener('click', function() {
            document.getElementById('resultSection').classList.remove('show');
            document.querySelector('.upload-btn').style.display = 'block';
            uploadBtn.textContent = '点击选择图片';
            uploadBtn.classList.remove('has-file');
            confirmUploadBtn.style.display = 'none';
            selectedFile = null;
            compressedFile = null;
            // 恢复压缩选项
            compressionToggle.disabled = false;
            compressionToggle.checked = true;
            compressionQuality.classList.add('show');
            compressionInfo.classList.remove('show');
        });
    </script>
</body>
</html>
