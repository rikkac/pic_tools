<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #FFD700;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 6px;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-small:hover {
            background: #FFD700;
            color: #000;
        }

        .btn-small.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-small.danger:hover {
            background: #ff4444;
            color: #fff;
        }

        /* 表格样式 */
        .table-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #1a1a1a;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 500;
            color: #888;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #222;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #151515;
        }

        .filename {
            font-family: monospace;
            color: #FFD700;
            letter-spacing: 1px;
        }

        .password {
            font-family: monospace;
            color: #666;
            font-size: 12px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 4px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-action:hover {
            border-color: #FFD700;
            color: #FFD700;
        }

        .btn-action.delete:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 消息提示 */
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .message.success {
            display: block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        /* 全屏图片模态 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal img,
        .modal video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px 24px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            color: #FFD700;
            font-weight: 500;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            justify-content: space-around;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        body.has-bottom-nav {
            padding-bottom: 80px;
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="container">
        <div class="header">
            <h1>图片管理</h1>
            <div class="header-actions">
                <a href="/upload-page" class="btn-small">上传图片</a>
                <a href="/" class="btn-small">返回首页</a>
                <button class="btn-small danger" id="logoutBtn">退出登录</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">图片总数</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>

        <div class="table-container">
            <table id="imageTable">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>密码</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="imageList">
                    <tr>
                        <td colspan="3" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 全屏图片 -->
    <div class="modal" id="imageModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content">
            <img src="" alt="图片预览" id="modalImage">
            <video src="" alt="视频预览" id="modalVideo" controls style="display: none;"></video>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="/" class="nav-item" data-page="index">首页</a>
        <a href="/upload-page" class="nav-item" data-page="upload">上传</a>
        <a href="/admin" class="nav-item active" data-page="list">列表</a>
    </div>

    <script>
        // 加载图片列表
        async function loadImages() {
            const tbody = document.getElementById('imageList');
            tbody.innerHTML = '<tr><td colspan="3" class="loading">加载中...</td></tr>';

            try {
                const response = await fetch('/api/images');
                const data = await response.json();

                if (!data.success) {
                    showMessage(data.message || '加载失败', 'error');
                    return;
                }

                const images = data.images || [];
                document.getElementById('totalCount').textContent = images.length;

                if (images.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><p>暂无图片</p></td></tr>';
                    return;
                }

                tbody.innerHTML = images.map(img => `
                    <tr>
                        <td>
                            <span class="filename">${img.type === 'video' ? '🎬 ' : '🖼️ '}${img.filename}</span>
                        </td>
                        <td>
                            <span class="password">${img.password}</span>
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-action" onclick="viewFile('${img.type}', '${img.url}')">查看</button>
                                <button class="btn-action delete" onclick="deleteImage('${img.password}', '${img.filename}')">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showMessage('加载失败', 'error');
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state">加载失败</td></tr>';
            }
        }

        // 查看文件（图片或视频）
        function viewFile(type, url) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalVideo = document.getElementById('modalVideo');

            if (type === 'video') {
                modalImage.style.display = 'none';
                modalVideo.style.display = 'block';
                modalVideo.src = url;
                modalVideo.play();
            } else {
                modalVideo.pause();
                modalVideo.style.display = 'none';
                modalImage.style.display = 'block';
                modalImage.src = url;
            }
            modal.classList.add('show');
        }

        // 关闭按钮
        document.getElementById('modalClose').addEventListener('click', function() {
            const modal = document.getElementById('imageModal');
            const modalVideo = document.getElementById('modalVideo');
            modalVideo.pause();
            modal.classList.remove('show');
        });

        // 点击图片外部关闭
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                const modalVideo = document.getElementById('modalVideo');
                modalVideo.pause();
                this.classList.remove('show');
            }
        });

        // 删除图片
        async function deleteImage(password, filename) {
            if (!confirm(`确定要删除图片 "${filename}" 吗？此操作不可恢复。`)) {
                return;
            }

            try {
                const response = await fetch(`/delete/${password}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    showMessage('删除成功', 'success');
                    loadImages(); // 刷新列表
                } else {
                    showMessage(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            try {
                await fetch('/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (e) {
                showMessage('退出失败', 'error');
            }
        });

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 页面加载时获取图片列表
        loadImages();
    </script>
</body>
</html>
