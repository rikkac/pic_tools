<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #FFD700;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 6px;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-small:hover {
            background: #FFD700;
            color: #000;
        }

        .btn-small.danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-small.danger:hover {
            background: #ff4444;
            color: #fff;
        }

        /* 表格样式 */
        .table-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #1a1a1a;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 500;
            color: #888;
            font-size: 14px;
            border-bottom: 1px solid #333;
        }

        /* 可滑动的行 */
        .swipe-row {
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #222;
        }

        .swipe-row:last-child {
            border-bottom: none;
        }

        .swipe-content {
            display: flex;
            background: #111;
            transition: transform 0.3s ease;
            touch-action: pan-y;
        }

        .swipe-row:hover .swipe-content {
            background: #151515;
        }

        .swipe-cell {
            padding: 16px;
            display: flex;
            align-items: center;
        }

        .swipe-cell:nth-child(1) { flex: 2; }
        .swipe-cell:nth-child(2) { flex: 1; justify-content: center; }
        .swipe-cell:nth-child(3) { flex: 1; justify-content: center; }

        /* 删除按钮层 - 右侧 */
        .swipe-delete {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: #ff4444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .swipe-delete.show {
            transform: translateX(0);
        }

        .filename {
            font-family: monospace;
            color: #FFD700;
            letter-spacing: 1px;
        }

        .view-count {
            color: #888;
            font-size: 12px;
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 4px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-action:hover {
            border-color: #FFD700;
            color: #FFD700;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 消息提示 */
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .message.success {
            display: block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        /* 全屏图片模态 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal img,
        .modal video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        /* 表格头部 */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            color: #888;
            font-size: 14px;
        }

        .total-count {
            color: #FFD700;
        }

        /* 底部导航 */
        .bottom-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            justify-content: space-around;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        body.has-bottom-nav {
            padding-bottom: 80px;
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="container">
        <div class="header">
            <h1>图片管理</h1>
            <div class="header-actions">
                <button class="btn-small danger" id="logoutBtn">退出登录</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="table-header">
            <span>文件列表</span>
            <span class="total-count">总计: <span id="totalCount">0</span></span>
        </div>

        <div class="table-container">
            <table id="imageTable">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>查看</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="imageList">
                    <tr>
                        <td colspan="3" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 全屏图片 -->
    <div class="modal" id="imageModal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-content">
            <img src="" alt="图片预览" id="modalImage">
            <video src="" alt="视频预览" id="modalVideo" controls style="display: none;"></video>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="/" class="nav-item" data-page="index">首页</a>
        <a href="/upload-page" class="nav-item" data-page="upload">上传</a>
        <a href="/admin" class="nav-item active" data-page="list">列表</a>
    </div>

    <script>
        // 加载图片列表
        async function loadImages() {
            const tbody = document.getElementById('imageList');
            tbody.innerHTML = '<tr><td colspan="3" class="loading">加载中...</td></tr>';

            try {
                const response = await fetch('/api/images');
                const data = await response.json();

                if (!data.success) {
                    showMessage(data.message || '加载失败', 'error');
                    return;
                }

                const images = data.images || [];
                document.getElementById('totalCount').textContent = images.length;

                if (images.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><p>暂无图片</p></td></tr>';
                    return;
                }

                tbody.innerHTML = images.map(img => `
                    <tr class="swipe-row" data-password="${img.password}" data-filename="${img.filename}">
                        <td colspan="3" style="padding:0;">
                            <div class="swipe-content">
                                <div class="swipe-cell">
                                    <span class="filename" onclick="copyPassword('${img.password}')" style="cursor:pointer;">${img.type === 'video' ? '🎬 ' : '🖼️ '}${img.filename}</span>
                                </div>
                                <div class="swipe-cell">
                                    <span class="view-count">${img.view_count || 0}</span>
                                </div>
                                <div class="swipe-cell">
                                    <button class="btn-action" onclick="viewFile('${img.type}', '${img.url}')">查看</button>
                                </div>
                            </div>
                            <div class="swipe-delete" onclick="handleSwipeDelete('${img.password}', '${img.filename}')">删除</div>
                        </td>
                    </tr>
                `).join('');

                // 初始化滑动事件
                initSwipeEvents();
            } catch (e) {
                showMessage('加载失败', 'error');
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state">加载失败</td></tr>';
            }
        }

        // 查看文件（图片或视频）
        function viewFile(type, url) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalVideo = document.getElementById('modalVideo');

            if (type === 'video') {
                modalImage.style.display = 'none';
                modalVideo.style.display = 'block';
                modalVideo.src = url;
                modalVideo.play();
            } else {
                modalVideo.pause();
                modalVideo.style.display = 'none';
                modalImage.style.display = 'block';
                modalImage.src = url;
            }
            modal.classList.add('show');
        }

        // 关闭按钮
        document.getElementById('modalClose').addEventListener('click', function() {
            const modal = document.getElementById('imageModal');
            const modalVideo = document.getElementById('modalVideo');
            modalVideo.pause();
            modal.classList.remove('show');
        });

        // 点击图片外部关闭
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                const modalVideo = document.getElementById('modalVideo');
                modalVideo.pause();
                this.classList.remove('show');
            }
        });

        // 复制密码
        async function copyPassword(password) {
            try {
                await navigator.clipboard.writeText(password);
            } catch (e) {
                const input = document.createElement('input');
                input.value = password;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
            }
            // 显示弹窗提示
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:#FFD700;padding:20px 40px;border-radius:8px;font-size:16px;z-index:9999;';
            toast.textContent = '密码已复制';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        // 删除图片
        async function deleteImage(password, filename) {
            if (!confirm(`确定要删除图片 "${filename}" 吗？此操作不可恢复。`)) {
                return;
            }

            try {
                const response = await fetch(`/delete/${password}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    showMessage('删除成功', 'success');
                    loadImages(); // 刷新列表
                } else {
                    showMessage(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showMessage('删除失败', 'error');
            }
        }

        // 右滑删除处理
        function handleSwipeDelete(password, filename) {
            deleteImage(password, filename);
        }

        // 初始化滑动事件
        function initSwipeEvents() {
            const rows = document.querySelectorAll('.swipe-row');
            let startX = 0;
            let currentX = 0;
            let isDragging = false;

            rows.forEach(row => {
                const content = row.querySelector('.swipe-content');
                const deleteBtn = row.querySelector('.swipe-delete');
                let translateX = 0;

                // 关闭其他已打开的滑动行
                const closeOtherRows = () => {
                    rows.forEach(otherRow => {
                        if (otherRow !== row) {
                            otherRow.querySelector('.swipe-content').style.transform = 'translateX(0)';
                            otherRow.querySelector('.swipe-delete').classList.remove('show');
                        }
                    });
                };

                row.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    closeOtherRows();
                }, { passive: true });

                row.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    const diff = startX - currentX; // 左滑时 diff > 0

                    // 只响应左滑
                    if (diff > 0) {
                        translateX = Math.min(diff, 80);
                        content.style.transform = `translateX(-${translateX}px)`;

                        if (translateX >= 60) {
                            deleteBtn.classList.add('show');
                        } else {
                            deleteBtn.classList.remove('show');
                        }
                    }
                }, { passive: true });

                row.addEventListener('touchend', () => {
                    isDragging = false;
                    if (translateX < 60) {
                        content.style.transform = 'translateX(0)';
                        deleteBtn.classList.remove('show');
                    } else {
                        content.style.transform = 'translateX(-60px)';
                        deleteBtn.classList.add('show');
                    }
                    translateX = 0;
                }, { passive: true });

                // 点击内容区域关闭滑动
                content.addEventListener('click', () => {
                    if (translateX > 0) {
                        content.style.transform = 'translateX(0)';
                        deleteBtn.classList.remove('show');
                        translateX = 0;
                    }
                });
            });

            // 点击空白处关闭所有滑动
            document.querySelector('.table-container').addEventListener('click', (e) => {
                if (!e.target.closest('.swipe-row')) {
                    rows.forEach(row => {
                        row.querySelector('.swipe-content').style.transform = 'translateX(0)';
                        row.querySelector('.swipe-delete').classList.remove('show');
                    });
                }
            });
        }

        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            try {
                await fetch('/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (e) {
                showMessage('退出失败', 'error');
            }
        });

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 页面加载时获取图片列表
        loadImages();
    </script>
</body>
</html>
