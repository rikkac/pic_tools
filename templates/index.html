<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图片查看</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: calc(100vh - 120px);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #FFD700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #FFD700;
        }

        input::placeholder {
            color: #666;
            letter-spacing: 1px;
            text-transform: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            background: transparent;
            border: 1px solid #FFD700;
            border-radius: 8px;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:active {
            background: #FFD700;
            color: #000;
        }

        .btn-full {
            background: #FFD700;
            color: #000;
        }

        .btn-full:active {
            background: #E6C200;
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .message.success {
            display: block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid #FFD700;
        }

        /* 全屏图片模态 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal img,
        .modal video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-section {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .preview-section.show {
            display: block;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #333;
            transition: border-color 0.3s;
        }

        .preview-image:hover {
            border-color: #FFD700;
        }

        .preview-label {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }

        /* 底部导航 */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .bottom-nav.show {
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }

        /* 为底部导航预留空间 */
        body.has-bottom-nav {
            padding-bottom: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片查看</h1>

        <div id="message" class="message"></div>

        <div class="input-group">
            <input
                type="text"
                id="password"
                placeholder="请输入图片密码"
                maxlength="8"
                autocomplete="off"
            >
        </div>

        <button class="btn btn-full" id="viewBtn">查看</button>
    </div>

    <!-- 全屏模态 -->
    <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <img src="" alt="全屏图片" id="modalImage">
        <video src="" alt="全屏视频" id="modalVideo" controls style="display: none;"></video>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav" id="bottomNav">
        <a href="/" class="nav-item active" data-page="index">首页</a>
        <a href="/upload-page" class="nav-item" data-page="upload">上传</a>
        <a href="/admin" class="nav-item" data-page="list">列表</a>
    </div>

    <script>
        // 密码输入框限制：只允许大写字母和数字
        const passwordInput = document.getElementById('password');
        passwordInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^A-Z0-9]/g, '').toUpperCase();
        });

        // 阻止粘贴非大写字母和数字
        passwordInput.addEventListener('paste', function(e) {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            const filtered = paste.replace(/[^A-Z0-9]/g, '').toUpperCase();
            document.execCommand('insertText', false, filtered);
        });

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 查看文件
        document.getElementById('viewBtn').addEventListener('click', async function() {
            const password = passwordInput.value.trim();
            if (!password) {
                showMessage('请输入密码', 'error');
                return;
            }

            if (password.length !== 8) {
                showMessage('密码必须是8位', 'error');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = '查询中...';

            try {
                // 先尝试管理员登录
                const loginResponse = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const loginData = await loginResponse.json();

                if (loginData.success) {
                    window.location.href = '/upload-page';
                    return;
                }

                // 查询文件
                const response = await fetch('/api/check-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const data = await response.json();

                if (data.exists) {
                    const fileUrl = `/file/${password}`;
                    const modal = document.getElementById('modal');
                    const modalImage = document.getElementById('modalImage');
                    const modalVideo = document.getElementById('modalVideo');

                    if (data.type === 'video') {
                        modalImage.style.display = 'none';
                        modalVideo.style.display = 'block';
                        modalVideo.src = fileUrl;
                        modalVideo.play();
                    } else {
                        modalVideo.pause();
                        modalVideo.style.display = 'none';
                        modalImage.style.display = 'block';
                        modalImage.src = fileUrl;
                    }
                    modal.classList.add('show');
                } else {
                    showMessage('文件不存在', 'error');
                }
            } catch (e) {
                showMessage('请求失败', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '查看';
            }
        });

        // 关闭模态
        document.getElementById('modalClose').addEventListener('click', function() {
            const modalVideo = document.getElementById('modalVideo');
            modalVideo.pause();
            document.getElementById('modal').classList.remove('show');
        });

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                document.getElementById('modalVideo').pause();
                this.classList.remove('show');
            }
        });

        // 回车查看图片
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('viewBtn').click();
            }
        });

        // 检测登录状态并显示底部导航
        async function checkLoginAndShowNav() {
            try {
                const response = await fetch('/api/check-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: 'SEAGULL7'})
                });
                // 如果能检测管理员密码，说明已登录
                // 或者直接检查 session
                // 这里用另一种方式：尝试调用需要管理员权限的 API
                const adminResponse = await fetch('/api/images');
                if (adminResponse.status === 200) {
                    document.getElementById('bottomNav').classList.add('show');
                    document.body.classList.add('has-bottom-nav');
                }
            } catch (e) {
                // 未登录，不显示导航
            }
        }
        checkLoginAndShowNav();
    </script>
</body>
</html>
